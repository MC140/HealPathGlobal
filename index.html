/* CHECKBOX ROW — entire area is a label so fully clickable */
.consent-label {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  background: #F9F8F5;
  border: 1px solid #E2E6ED;
  border-left: 3px solid #0B1F3A;
  border-radius: 3px;
  padding: 16px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: border-color 0.2s;
  user-select: none;
}
.consent-label:hover { border-color: #C9A84C; border-left-color: #C9A84C; }
.consent-label.error { border-color: #C0392B; border-left-color: #C0392B; background: #FEF2F2; }
.consent-label input[type="checkbox"] {
  width: 22px;
  height: 22px;
  min-width: 22px;
  margin-top: 2px;
  flex-shrink: 0;
  accent-color: #0B1F3A;
  cursor: pointer;
}
.consent-text { font-size: 0.85rem; line-height: 1.65; color: #2D3748; }
.consent-text a { color: #0B1F3A; font-weight: 700; text-decoration: underline; }
.consent-text a:hover { color: #C9A84C; }

.error-msg { display: none; font-size: 0.78rem; color: #C0392B; font-weight: 700; margin: -12px 0 14px 2px; }
.error-msg.show { display: block; }

.btn {
  width: 100%;
  background: #0B1F3A;
  color: #fff;
  border: none;
  padding: 15px;
  font-family: 'Lato', sans-serif;
  font-weight: 900;

.fine-print { text-align: center; margin-top: 14px; font-size: 0.72rem; color: #9CA3AF; line-height: 1.55; }

<script>
  function goToSite() {
    var cb = document.getElementById('cb');
    var label = document.getElementById('consent-label');
    var errorMsg = document.getElementById('error-msg');
    var btn = document.getElementById('btn');

    // Not checked — show error and stop
    if (!cb.checked) {
      label.classList.add('error');
      errorMsg.classList.add('show');
      return;
    }

    // Checked — disable button and go
    btn.disabled = true;
    btn.textContent = 'Loading...';

    // Save consent
    localStorage.setItem('hpg_consented', 'true');

    // Email notification (24hr cooldown)
    try {
      var lastEmail = localStorage.getItem('hpg_last_email');
      var now = Date.now();
      if (!lastEmail || (now - parseInt(lastEmail)) > 86400000) {
        emailjs.init('AJAz9caMIq_GvCjla');

        // Gather visitor details
        var ua = navigator.userAgent;
        var device = /Mobi|Android|iPhone|iPad/i.test(ua) ? 'Mobile' : 'Desktop';
        var browser = 'Unknown';
        if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browser = 'Chrome';
        else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browser = 'Safari';
        else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
        else if (ua.indexOf('Edg') > -1) browser = 'Edge';
        var language = navigator.language || 'Unknown';
        var referrer = document.referrer ? document.referrer : 'Direct / Typed URL';
        var screenSize = window.screen.width + 'x' + window.screen.height;
        var timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';

        // Fetch IP-based location then send email
        fetch('https://ipapi.co/json/')
          .then(function(r){ return r.json(); })
          .catch(function(){ return {}; })
          .then(function(geo) {
            emailjs.send('service_b2gdl8s', 'template_x5mkqvo', {
              timestamp: new Date().toLocaleString(),
              page: window.location.href,
              device: device,
              browser: browser,
              language: language,
              referrer: referrer,
              screen: screenSize,
              timezone: timezone,
              city: geo.city || 'Unknown',
              region: geo.region || 'Unknown',
              country: geo.country_name || 'Unknown',
              ip: geo.ip || 'Unknown',
              isp: geo.org || 'Unknown'
            });
          });

        localStorage.setItem('hpg_last_email', now.toString());
      }
    } catch(e) {}

    // Navigate to main site
    setTimeout(function() {
      window.location.href = 'main.html';
    }, 500);
  }

  // Remove error styling when checkbox is clicked
  document.getElementById('cb').addEventListener('change', function() {
    document.getElementById('consent-label').classList.remove('error');
    document.getElementById('error-msg').classList.remove('show');
  });

  // Skip gate if already consented
  if (localStorage.getItem('hpg_consented') === 'true') {
    window.location.href = 'main.html';
  }
</script>
